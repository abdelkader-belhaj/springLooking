spring.application.name=looking

server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ==============================
# MySQL
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/lookingBDV01?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=86400000

# ==============================
# Mail
# ==============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from-address=${MAIL_FROM_ADDRESS:no-reply@tunisia-tour.tn}
app.mail.from-name=${MAIL_FROM_NAME:TunisiaTour Security}

# ==============================
# Password reset
# ==============================
app.password-reset.frontend-url=http://localhost:4200/reset-password

# ==============================
# Frontend & Company
# ==============================
app.frontend.base-url=${APP_FRONTEND_URL:http://192.168.10.166:4200}
app.company.name=TunisiaTour
app.company.email=contact@tunisiatour.tn

# ==============================
# Face AI service (FastAPI)
# ==============================
face.ai.base-url=${FACE_AI_BASE_URL:http://localhost:8001}

# ==============================
# Twilio SMS
# ==============================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# ==============================
# OpenWeatherMap API
# ==============================
weather.api.key=${WEATHER_API_KEY:}

# ==============================
# Payment
# ==============================
app.payment.mock=true
app.payment.mock.email.send=true

# ==============================
# assistant recommandation
# ==============================
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}

# qr code
vision.ai.provider=${VISION_AI_PROVIDER:groq}
vision.ai.api.key=${VISION_AI_API_KEY:${GROQ_API_KEY:}}
vision.ai.api.url=${VISION_AI_API_URL:${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}}
vision.ai.model=${VISION_AI_MODEL:llama-3.2-11b-vision-preview}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:}
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}